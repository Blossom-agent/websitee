<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你是哪一種花｜繁花 BLOSSOM AGENT 花格人格測驗</title>
    <meta
      name="description"
      content="繁花 BLOSSOM AGENT 花格人格測驗——回答 8 道題，看看妳是哪一種花，綻放成屬於自己的姿態。"
    />
    <style>
      :root {
        --ink: #3f3435;
        --ink-2: #5b4848;
        --muted: #7f6e6c;
        --paper: #fbf5ef;
        --cream: #f6ebe1;
        --blush: #ecccc6;
        --rose: #c47a7a;
        --rose-d: #9a4a4f;
        --sage: #9fb39a;
        --moss: #5e7659;
        --plum: #7d4f64;
        --seal: #a93538;
        --gold: #b89865;
        --line: rgba(86, 62, 62, 0.14);
        --shadow: 0 24px 70px rgba(81, 54, 50, 0.14);
        --shadow-soft: 0 10px 30px rgba(81, 54, 50, 0.08);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Garamond Premier", "一點明體", serif;
        font-weight: 300;
        line-height: 1.85;
        letter-spacing: 0.02em;
        -webkit-font-smoothing: antialiased;
        background:
          radial-gradient(ellipse at 75% 12%, rgba(236, 204, 198, 0.5) 0%, transparent 52%),
          radial-gradient(ellipse at 15% 88%, rgba(196, 184, 144, 0.22) 0%, transparent 55%),
          linear-gradient(165deg, #fbf5ef 0%, #f6ebe1 58%, #f3e3d3 100%);
        overflow-x: hidden;
      }

      h1, h2, h3 {
        margin: 0;
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: 0.06em;
        color: var(--ink);
      }

      /* ===== falling petals ===== */
      .petals { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
      .petals span {
        position: absolute;
        top: -8%;
        width: 13px;
        height: 13px;
        background: radial-gradient(circle at 30% 30%, #fff0ed 0%, #f0c1bd 60%, #d99592 100%);
        border-radius: 70% 0 70% 0;
        opacity: 0;
        animation: petalFall linear infinite;
      }
      .petals span:nth-child(1) { left: 9%;  animation-duration: 15s; animation-delay: 0s;   }
      .petals span:nth-child(2) { left: 22%; animation-duration: 18s; animation-delay: 3s;   }
      .petals span:nth-child(3) { left: 38%; animation-duration: 20s; animation-delay: 6s;   }
      .petals span:nth-child(4) { left: 54%; animation-duration: 16s; animation-delay: 1.5s; }
      .petals span:nth-child(5) { left: 68%; animation-duration: 22s; animation-delay: 4.5s; }
      .petals span:nth-child(6) { left: 84%; animation-duration: 17s; animation-delay: 7s;   }
      @keyframes petalFall {
        0%   { transform: translateY(0) translateX(0) rotate(0); opacity: 0; }
        8%   { opacity: 0.65; }
        100% { transform: translateY(112vh) translateX(70px) rotate(540deg); opacity: 0; }
      }

      /* ===== layout ===== */
      .wrap {
        position: relative;
        z-index: 1;
        width: min(640px, 100%);
        margin: 0 auto;
        padding: calc(76px + clamp(40px, 8vw, 88px)) clamp(20px, 5vw, 40px) 80px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }


      .card {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .kicker {
        color: var(--seal);
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        margin: 0 0 16px;
      }

      /* ===== intro ===== */
      .intro { text-align: center; }
      .intro h1 { font-size: clamp(2.3rem, 7vw, 3.4rem); letter-spacing: 0.1em; }
      .intro .lead {
        margin: 22px auto 8px;
        max-width: 440px;
        color: var(--ink-2);
        font-size: clamp(1.02rem, 1.6vw, 1.15rem);
        line-height: 1.95;
      }
      .intro-art { width: 150px; margin: 0 auto 18px; }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 13px 36px;
        border: 0;
        border-radius: 999px;
        background: var(--seal);
        color: #fff7ee;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 0.16em;
        cursor: pointer;
        transition: transform 200ms ease, box-shadow 200ms ease, background 200ms ease;
        box-shadow: 0 12px 26px rgba(169, 53, 56, 0.26);
      }
      .btn:hover { transform: translateY(-3px); box-shadow: 0 18px 34px rgba(169, 53, 56, 0.32); }
      .btn.ghost {
        background: transparent;
        color: var(--seal);
        border: 1.5px solid rgba(169, 53, 56, 0.4);
        box-shadow: none;
      }
      .btn.ghost:hover { background: rgba(169, 53, 56, 0.06); transform: translateY(-2px); }
      .intro .btn { margin-top: 30px; }

      /* ===== progress ===== */
      .progress-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.84rem;
        letter-spacing: 0.12em;
      }
      .progress-track {
        height: 5px;
        border-radius: 999px;
        background: rgba(169, 53, 56, 0.14);
        overflow: hidden;
        margin-bottom: clamp(28px, 5vw, 46px);
      }
      .progress-fill {
        height: 100%;
        width: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--rose), var(--seal));
        transition: width 350ms cubic-bezier(.4, 0, .2, 1);
      }

      .question {
        font-size: clamp(1.4rem, 3.4vw, 1.9rem);
        font-weight: 600;
        line-height: 1.5;
        letter-spacing: 0.04em;
        margin-bottom: clamp(26px, 5vw, 40px);
      }

      .options { display: grid; gap: 14px; }
      .option {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        text-align: left;
        padding: 18px 22px;
        border: 1.5px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.66);
        color: var(--ink);
        font-family: inherit;
        font-size: clamp(0.98rem, 1.5vw, 1.08rem);
        line-height: 1.6;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      }
      .option:hover {
        transform: translateY(-2px);
        border-color: var(--rose);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-soft);
      }
      .option .dot {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(169, 53, 56, 0.1);
        color: var(--seal);
        font-size: 0.85rem;
        font-weight: 600;
      }

      .quiz-foot { margin-top: 26px; }
      .quiz-foot .btn { min-height: 44px; padding: 8px 22px; font-size: 0.86rem; }

      /* ===== result ===== */
      .result { text-align: center; }
      .result-art { width: clamp(150px, 40vw, 200px); margin: 0 auto 6px; }
      .result .kicker { margin-bottom: 6px; }
      .result h2 {
        font-size: clamp(2rem, 6vw, 3rem);
        letter-spacing: 0.12em;
      }
      .result .flower-en {
        margin: 6px 0 0;
        color: var(--gold);
        font-size: 0.9rem;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }
      .result .tagline {
        margin: 18px auto 0;
        max-width: 420px;
        color: var(--seal);
        font-size: clamp(1.1rem, 2vw, 1.3rem);
        font-weight: 500;
        font-style: italic;
      }
      .result .desc {
        margin: 22px auto 0;
        max-width: 460px;
        color: var(--ink-2);
        font-size: 1.04rem;
        line-height: 1.95;
      }
      .traits {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 26px 0 4px;
      }
      .trait {
        padding: 7px 16px;
        border-radius: 999px;
        background: rgba(169, 53, 56, 0.08);
        border: 1px solid rgba(169, 53, 56, 0.16);
        color: var(--rose-d);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
      }
      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        margin-top: 34px;
      }

      .is-hidden { display: none !important; }

      .fade-in { animation: fadeIn 480ms ease both; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .petals span { animation: none; display: none; }
        .fade-in { animation: none; }
      }

      /* ===== 行動裝置字級調校 — 依常見手機螢幕寬度縮放 ===== */
      @media (max-width: 600px) { html { font-size: 93.75%; } }   /* 15px */
      @media (max-width: 430px) { html { font-size: 90.5%; } }    /* ~14.5px，iPhone Pro Max */
      @media (max-width: 393px) { html { font-size: 87.5%; } }    /* 14px，iPhone 12–16 / Pixel */
      @media (max-width: 360px) { html { font-size: 84.4%; } }    /* ~13.5px，常見 Android */
      @media (max-width: 320px) { html { font-size: 81.25%; } }   /* 13px，迷你螢幕 */

      /* 標題在小螢幕另外收斂 */
      @media (max-width: 480px) {
        .intro h1 { font-size: clamp(1.9rem, 8.5vw, 2.5rem); }
        .question { font-size: clamp(1.25rem, 5vw, 1.6rem); }
        .result h2 { font-size: clamp(1.7rem, 7.5vw, 2.4rem); }
        .result .tagline { font-size: clamp(1rem, 4.2vw, 1.2rem); }
      }

      /* ===== 網頁尾部（與首頁 index 相同） ===== */
      .site-footer {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 60px clamp(20px, 5vw, 76px) 40px;
        background: #2b1f1f;
        color: #d8c5c1;
        text-align: center;
      }
      .site-footer .footer-seal { transform: scale(0.7); }
      .site-footer .seal-frame {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
        place-items: center;
        gap: 0;
        width: 100px;
        aspect-ratio: 1;
        padding: 12px;
        background: #a52224;
        border: 2px solid rgba(253, 244, 237, 0.92);
        color: #fff7ee;
        font-family: "Garamond Premier", "一點明體", serif;
        text-align: center;
        box-shadow:
          inset 0 0 0 4px #a52224,
          inset 0 0 0 7px rgba(253, 244, 237, 0.82),
          inset 0 0 0 10px #a52224,
          0 16px 30px rgba(81, 24, 26, 0.22);
      }
      .site-footer .seal-frame::before {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1.5px solid rgba(253, 244, 237, 0.88);
        pointer-events: none;
      }
      .site-footer .seal-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle at 12% 78%, rgba(253, 244, 237, 0.42) 0 3px, transparent 8px),
          radial-gradient(circle at 88% 22%, rgba(253, 244, 237, 0.36) 0 3px, transparent 7px),
          linear-gradient(28deg, transparent 0 43%, rgba(253, 244, 237, 0.13) 44% 46%, transparent 47% 100%);
        opacity: 0.78;
      }
      .site-footer .seal-zh {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 700;
        line-height: 1.08;
        writing-mode: vertical-rl;
        letter-spacing: 0.12em;
      }
      .site-footer .seal-en {
        margin-top: 8px;
        font-size: 0.5rem;
        font-weight: 500;
        line-height: 1.4;
        writing-mode: vertical-rl;
        letter-spacing: 0.12em;
        color: rgba(255, 247, 238, 0.82);
      }
      .site-footer .footer-tagline {
        margin: 0;
        font-family: "Garamond Premier", "一點明體", serif;
        font-size: 1.15rem;
        letter-spacing: 0.16em;
        color: #ecd9d5;
      }
      .site-footer .footer-copy {
        margin: 0;
        color: #8a7572;
        font-size: 0.84rem;
        letter-spacing: 0.1em;
      }
      /* ===== 頁首橫幅（與 index 一致） ===== */
      .site-header {
        position: fixed;
        inset: 0 0 auto;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 76px;
        padding: 14px clamp(18px, 4vw, 54px);
        background: rgba(251, 245, 239, 0.86);
        border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        transition: background 240ms ease, box-shadow 240ms ease;
      }
      .site-header.is-scrolled {
        background: rgba(251, 245, 239, 0.96);
        box-shadow: 0 1px 20px rgba(81, 54, 50, 0.06);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-family: "Garamond Premier", "一點明體", serif;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-decoration: none;
        color: var(--ink);
      }
      .brand-mark {
        display: grid;
        width: 46px;
        height: 46px;
        place-items: center;
        color: #fff;
        background: var(--seal);
        font-size: 1.04rem;
        font-weight: 700;
        letter-spacing: 0;
        border-radius: 3px;
        box-shadow: 0 4px 14px rgba(169, 53, 56, 0.28);
      }
      .brand-en {
        color: var(--ink-2);
        font-family: "Garamond Premier", "一點明體", serif;
        font-size: 0.86rem;
        letter-spacing: 0.18em;
      }
      .site-nav {
        display: flex;
        align-items: center;
      }
      .nav-home {
        padding: 9px 18px;
        color: #fff;
        background: var(--seal);
        border-radius: 2px;
        font-size: 0.94rem;
        font-weight: 400;
        letter-spacing: 0.08em;
        text-decoration: none;
        transition: background 200ms ease;
      }
      .nav-home:hover { background: var(--rose-d); color: #fff; }

      @media (max-width: 620px) {
        .site-header { min-height: 64px; padding: 10px clamp(14px, 4vw, 24px); }
        .brand { gap: 10px; }
        .brand-mark { width: 40px; height: 40px; font-size: 0.96rem; }
        .brand-en { font-size: 0.74rem; }
      }
    </style>
  </head>
  <body>

      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <header class="site-header" aria-label="主導覽">
      <a class="brand" href="index.html" aria-label="繁花首頁">

      <nav class="site-nav">

    <div class="wrap">
      <main class="card">
        <!-- ===== Intro ===== -->
        <section id="intro" class="intro fade-in">
          <div class="intro-art" aria-hidden="true">
            <!-- generic bloom -->
            <svg viewBox="0 0 120 120">
              <g fill="#c44a4a">
                <circle cx="60" cy="36" r="17" />
                <circle cx="36" cy="54" r="17" />
                <circle cx="84" cy="54" r="17" />

            <button class="btn ghost" type="button" id="back-btn">← 上一題</button>
          </div>

        <!-- ===== Result ===== -->
        <section id="result" class="result is-hidden">
          <div class="result-art" id="result-art" aria-hidden="true"></div>
          <p class="kicker">妳的花格是</p>
          <h2 id="result-name"></h2>
          <p class="flower-en" id="result-en"></p>
          <p class="tagline" id="result-tagline"></p>

          <small class="seal-en">BLOSSOM<br />AGENT</small>

      <p class="footer-copy">© <span id="year"></span> 繁花 BLOSSOM AGENT. All rights reserved.</p>
    </footer>

    <script>

        const header = document.querySelector(".site-header");
        const onScroll = () =>
          header?.classList.toggle("is-scrolled", window.scrollY > 24);

        // 頁尾年份
        const year = document.getElementById("year");
        if (year) year.textContent = new Date().getFullYear();
      })();

          art: `<svg viewBox="0 0 120 120">

            </g>
            <circle cx="60" cy="59" r="24" fill="#c44a4a"/>

            <circle cx="60" cy="59" r="5" fill="#fceeec"/>
          </svg>`,
        },
        violet: {
          name: "紫羅蘭",
          en: "Violet",
          tagline: "神秘而獨立，妳自成一個世界。",
          desc: "妳安靜、有想法，不輕易把心交出去——但一旦交出，便是全心。妳的魅力來自那份「猜不透」，讓人想更靠近、更了解。妳忠於自己，從不為誰改變綻放的方向。",
          traits: ["獨立", "神秘", "有個性", "深情"],
          art: `<svg viewBox="0 0 120 120">
            <g fill="#a89bc8">
              <circle cx="46" cy="44" r="15"/><circle cx="74" cy="44" r="15"/>
              <circle cx="42" cy="66" r="15"/><circle cx="78" cy="66" r="15"/>
            </g>
            <ellipse cx="60" cy="55" rx="14" ry="18" fill="#7d4f64"/>
            <circle cx="60" cy="56" r="6" fill="#e8d68a"/>
          </svg>`,
        },
      };

      // ===== Questions: each option maps to a flower key =====
      const QUESTIONS = [
        {
          q: "週末的夜晚，妳最嚮往的場景是？",
          options: [
            { t: "成為派對的焦點，被一群人圍著聊天", f: "rose" },
            { t: "和三五好友窩在溫暖的小店談心", f: "sakura" },
            { t: "盛裝出席一場有格調的高級晚宴", f: "peony" },
            { t: "一個人在喜歡的角落，做自己的事", f: "violet" },
          ],
        },
        {
          q: "別人第一次見到妳，最常說的是？",
          options: [
            { t: "好有魅力，一眼就注意到妳", f: "rose" },
            { t: "好溫柔，跟妳相處好放鬆", f: "sakura" },
            { t: "好有氣質，感覺很有距離的高級感", f: "peony" },
            { t: "好特別，有種看不透的神秘感", f: "violet" },
          ],
        },
        {
          q: "面對喜歡的人，妳會？",
          options: [
            { t: "主動出擊，喜歡就大方表達", f: "rose" },
            { t: "默默對他好，用體貼讓他感受到", f: "sakura" },
            { t: "保持優雅，讓對方主動靠近我", f: "peony" },
            { t: "慢慢觀察，確定了才願意交心", f: "violet" },
          ],
        },
        {
          q: "妳挑選衣服時，最在意？",
          options: [
            { t: "夠亮眼，能襯托我的存在感", f: "rose" },
            { t: "柔和舒服，讓人覺得親切", f: "sakura" },
            { t: "質感與剪裁，低調但要高級", f: "peony" },
            { t: "獨特風格，跟別人不一樣", f: "violet" },
          ],
        },
        {
          q: "遇到挫折時，妳通常會？",
          options: [
            { t: "正面迎戰，越挫越勇", f: "rose" },
            { t: "找信任的人傾訴，被安慰後再出發", f: "sakura" },
            { t: "沉住氣，優雅地把局面穩下來", f: "peony" },
            { t: "自己消化，靜靜想清楚再行動", f: "violet" },
          ],
        },
        {
          q: "朋友眼中的妳，是個怎樣的存在？",
          options: [
            { t: "氣氛製造機，有我就熱鬧", f: "rose" },
            { t: "暖心擔當，難過時第一個想找我", f: "sakura" },
            { t: "可靠的大姐頭，關鍵時刻很罩", f: "peony" },
            { t: "深藏不露，認識越久越有趣", f: "violet" },
          ],
        },
        {
          q: "妳理想中「被愛」的方式是？",
          options: [
            { t: "熱烈又直接，讓我感受到滿滿的愛", f: "rose" },
            { t: "細水長流，每天的小體貼最動人", f: "sakura" },
            { t: "被珍重地對待，像對待珍寶一樣", f: "peony" },
            { t: "被真正讀懂，不用說就明白我", f: "violet" },
          ],
        },
        {
          q: "如果妳是一杯酒，妳會是？",
          options: [
            { t: "氣泡香檳，明亮又讓人雀躍", f: "rose" },
            { t: "微甜果酒，溫順好入口", f: "sakura" },
            { t: "陳年紅酒，越品越有層次", f: "peony" },
            { t: "單一純麥威士忌，個性鮮明", f: "violet" },
          ],
        },
      ];

      // ===== State =====
      const total = QUESTIONS.length;
      let current = 0;
      const answers = new Array(total).fill(null);

      const $ = (id) => document.getElementById(id);
      const introEl = $("intro");
      const quizEl = $("quiz");
      const resultEl = $("result");

      function show(el) {
        [introEl, quizEl, resultEl].forEach((s) => s.classList.add("is-hidden"));
        el.classList.remove("is-hidden");
        el.classList.remove("fade-in");
        void el.offsetWidth; // restart animation
        el.classList.add("fade-in");
      }

      function renderQuestion() {
        const item = QUESTIONS[current];
        $("q-counter").textContent = `第 ${current + 1} 題 / 共 ${total} 題`;
        const pct = Math.round((current / total) * 100);
        $("q-percent").textContent = pct + "%";
        $("progress-fill").style.width = pct + "%";
        $("question-text").textContent = item.q;

        const box = $("options");
        box.innerHTML = "";
        const letters = ["A", "B", "C", "D", "E"];
        item.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "option";
          if (answers[current] === opt.f && answers[current] !== null) {
            // keep simple: no persistent highlight needed
          }
          btn.innerHTML = `<span class="dot">${letters[i]}</span><span>${opt.t}</span>`;
          btn.addEventListener("click", () => choose(opt.f));
          box.appendChild(btn);
        });

        $("back-btn").style.visibility = current === 0 ? "hidden" : "visible";
      }

      function choose(flowerKey) {
        answers[current] = flowerKey;
        if (current < total - 1) {
          current++;
          renderQuestion();
        } else {
          showResult();
        }
      }

      function showResult() {
        const tally = {};
        answers.forEach((a) => { if (a) tally[a] = (tally[a] || 0) + 1; });
        // pick highest; tie broken by question order of appearance
        let best = null, bestScore = -1;
        const order = ["rose", "sakura", "peony", "violet"];
        order.forEach((k) => {
          const s = tally[k] || 0;
          if (s > bestScore) { bestScore = s; best = k; }
        });
        const f = FLOWERS[best];
        $("result-art").innerHTML = f.art;
        $("result-name").textContent = f.name;
        $("result-en").textContent = f.en;
        $("result-tagline").textContent = f.tagline;
        $("result-desc").textContent = f.desc;
        const tEl = $("result-traits");
        tEl.innerHTML = "";
        f.traits.forEach((t) => {
          const span = document.createElement("span");
          span.className = "trait";
          span.textContent = t;
          tEl.appendChild(span);
        });
        $("progress-fill").style.width = "100%";
        show(resultEl);
      }

      function start() {
        current = 0;
        answers.fill(null);
        renderQuestion();
        show(quizEl);
      }

      $("start-btn").addEventListener("click", start);
      $("retry-btn").addEventListener("click", () => show(introEl));
      $("back-btn").addEventListener("click", () => {
        if (current > 0) { current--; renderQuestion(); }
      });
    </script>
  </body>
</html>
