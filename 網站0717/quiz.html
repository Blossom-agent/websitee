<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>妳是哪一種花｜繁花 BLOSSOM AGENT 12 花格氣質測驗</title>
    <meta
      name="description"
      content="繁花 BLOSSOM AGENT 花格人格測驗——回答 12 道情境題，找出妳最接近的 12 種花格。MBTI 僅作為趣味氣質參考。"
    />
    <style>
      :root {
        --ink: #3f3435;
        --ink-2: #5b4848;
        --muted: #7f6e6c;
        --paper: #fbf5ef;
        --cream: #f6ebe1;
        --blush: #ecccc6;
        --rose: #c47a7a;
        --rose-d: #9a4a4f;
        --sage: #9fb39a;
        --moss: #5e7659;
        --plum: #7d4f64;
        --seal: #a93538;
        --gold: #b89865;
        --line: rgba(86, 62, 62, 0.14);
        --shadow: 0 24px 70px rgba(81, 54, 50, 0.14);
        --shadow-soft: 0 10px 30px rgba(81, 54, 50, 0.08);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Garamond Premier", "一點明體", serif;
        font-weight: 300;
        line-height: 1.85;
        letter-spacing: 0.02em;
        -webkit-font-smoothing: antialiased;
        background:
          radial-gradient(ellipse at 75% 12%, rgba(236, 204, 198, 0.5) 0%, transparent 52%),
          radial-gradient(ellipse at 15% 88%, rgba(196, 184, 144, 0.22) 0%, transparent 55%),
          linear-gradient(165deg, #fbf5ef 0%, #f6ebe1 58%, #f3e3d3 100%);
        overflow-x: hidden;
      }

      h1, h2, h3 {
        margin: 0;
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: 0.06em;
        color: var(--ink);
      }

      /* ===== falling petals ===== */
      .petals { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
      .petals span {
        position: absolute;
        top: -8%;
        width: 13px;
        height: 13px;
        background: radial-gradient(circle at 30% 30%, #fff0ed 0%, #f0c1bd 60%, #d99592 100%);
        border-radius: 70% 0 70% 0;
        opacity: 0;
        animation: petalFall linear infinite;
      }
      .petals span:nth-child(1) { left: 9%;  animation-duration: 15s; animation-delay: 0s;   }
      .petals span:nth-child(2) { left: 22%; animation-duration: 18s; animation-delay: 3s;   }
      .petals span:nth-child(3) { left: 38%; animation-duration: 20s; animation-delay: 6s;   }
      .petals span:nth-child(4) { left: 54%; animation-duration: 16s; animation-delay: 1.5s; }
      .petals span:nth-child(5) { left: 68%; animation-duration: 22s; animation-delay: 4.5s; }
      .petals span:nth-child(6) { left: 84%; animation-duration: 17s; animation-delay: 7s;   }
      @keyframes petalFall {
        0%   { transform: translateY(0) translateX(0) rotate(0); opacity: 0; }
        8%   { opacity: 0.65; }
        100% { transform: translateY(112vh) translateX(70px) rotate(540deg); opacity: 0; }
      }

      /* ===== layout ===== */
      .wrap {
        position: relative;
        z-index: 1;
        width: min(720px, 100%);
        margin: 0 auto;
        padding: calc(76px + clamp(38px, 7vw, 80px)) clamp(20px, 5vw, 40px) 80px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .card {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .kicker {
        color: var(--seal);
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        margin: 0 0 16px;
      }

      /* ===== intro ===== */
      .intro { text-align: center; }
      .intro h1 { font-size: clamp(2.2rem, 7vw, 3.4rem); letter-spacing: 0.1em; }
      .intro .lead {
        margin: 22px auto 8px;
        max-width: 520px;
        color: var(--ink-2);
        font-size: clamp(1.02rem, 1.6vw, 1.15rem);
        line-height: 1.95;
      }
      .intro-art { width: clamp(132px, 34vw, 168px); margin: 0 auto 18px; }
      .note {
        display: block;
        width: fit-content;
        max-width: 100%;
        margin: 18px auto 0;
        padding: 13px clamp(26px, 8vw, 60px);
        border-radius: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.6) 24%,
          rgba(255, 255, 255, 0.6) 76%,
          transparent 100%);
        color: var(--rose-d);
        font-size: 0.9rem;
        line-height: 1.95;
        text-align: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 13px 36px;
        border: 0;
        border-radius: 999px;
        background: var(--seal);
        color: #fff7ee;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 0.16em;
        cursor: pointer;
        transition: transform 200ms ease, box-shadow 200ms ease, background 200ms ease;
        box-shadow: 0 12px 26px rgba(169, 53, 56, 0.26);
      }
      .btn:hover { transform: translateY(-3px); box-shadow: 0 18px 34px rgba(169, 53, 56, 0.32); }
      .btn.ghost {
        background: transparent;
        color: var(--seal);
        border: 1.5px solid rgba(169, 53, 56, 0.4);
        box-shadow: none;
      }
      .btn.ghost:hover { background: rgba(169, 53, 56, 0.06); transform: translateY(-2px); }
      .intro .btn { margin-top: 30px; }

      /* ===== progress ===== */
      .progress-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.84rem;
        letter-spacing: 0.12em;
      }
      .progress-track {
        height: 5px;
        border-radius: 999px;
        background: rgba(169, 53, 56, 0.14);
        overflow: hidden;
        margin-bottom: clamp(28px, 5vw, 46px);
      }
      .progress-fill {
        height: 100%;
        width: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--rose), var(--seal));
        transition: width 350ms cubic-bezier(.4, 0, .2, 1);
      }

      .question {
        font-size: clamp(1.34rem, 3.2vw, 1.9rem);
        font-weight: 600;
        line-height: 1.5;
        letter-spacing: 0.04em;
        margin-bottom: clamp(22px, 5vw, 36px);
      }
      .question-hint {
        display: block;
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 300;
        letter-spacing: 0.04em;
      }

      .options { display: grid; gap: 12px; }
      .option {
        position: relative;
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        text-align: left;
        padding: 15px 20px 15px 22px;
        border: 1px solid rgba(176, 144, 74, 0.2);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(251, 245, 239, 0.66));
        color: var(--ink);
        font-family: inherit;
        font-size: clamp(0.96rem, 1.45vw, 1.06rem);
        line-height: 1.55;
        cursor: pointer;
        overflow: hidden;
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.5),
          inset 0 0 0 5px rgba(184, 152, 101, 0.16);
        transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
      }
      /* 左側 朱印→金 強調條，hover 時滑入（呼應繁花分隔線） */
      .option::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--seal), var(--gold));
        transform: scaleY(0);
        transform-origin: top;
        transition: transform 300ms ease;
      }
      .option:hover {
        transform: translateY(-2px);
        border-color: rgba(176, 144, 74, 0.46);
        background: linear-gradient(180deg, #ffffff, rgba(251, 245, 239, 0.9));
        box-shadow:
          var(--shadow-soft),
          inset 0 0 0 4px rgba(255, 255, 255, 0.6),
          inset 0 0 0 5px rgba(184, 152, 101, 0.34);
      }
      .option:hover::before { transform: scaleY(1); }
      .option:active { transform: translateY(0); }
      .option:focus-visible { outline: 2px solid var(--seal); outline-offset: 3px; }
      .option .dot {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(169, 53, 56, 0.08);
        border: 1px solid rgba(169, 53, 56, 0.22);
        color: var(--seal);
        font-size: 0.85rem;
        font-weight: 600;
        transition: background 200ms ease, color 200ms ease, border-color 200ms ease, transform 200ms ease;
      }
      .option:hover .dot {
        background: var(--seal);
        border-color: var(--seal);
        color: #fff7ee;
        transform: scale(1.06);
      }

      .quiz-foot {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 24px;
      }
      .quiz-foot .btn { min-height: 44px; padding: 8px 20px; font-size: 0.86rem; }

      /* ===== result ===== */
      .result { text-align: center; }
      .result-art { width: clamp(168px, 44vw, 220px); margin: 0 auto 6px; }
      .result-art img { width: 100%; height: auto; display: block; }
      .result .kicker { margin-bottom: 6px; }
      .result h2 {
        font-size: clamp(2rem, 6vw, 3rem);
        letter-spacing: 0.12em;
      }
      .result .flower-en {
        margin: 6px 0 0;
        color: var(--gold);
        font-size: 0.9rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }
      .result .tagline {
        margin: 18px auto 0;
        max-width: 500px;
        color: var(--seal);
        font-size: clamp(1.1rem, 2vw, 1.3rem);
        font-weight: 500;
        font-style: italic;
      }
      .result .desc {
        margin: 20px auto 0;
        max-width: 530px;
        color: var(--ink-2);
        font-size: 1.04rem;
        line-height: 1.95;
      }
      .flower-language, .mbti-ref, .sub-result {
        display: block;
        width: fit-content;
        max-width: min(560px, 100%);
        margin: 18px auto 0;
        padding: 13px clamp(26px, 7vw, 56px);
        border-radius: 2px;
        border: none;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.6) 24%,
          rgba(255, 255, 255, 0.6) 76%,
          transparent 100%);
        color: var(--ink-2);
        line-height: 1.9;
        text-align: center;
      }
      .flower-language strong, .mbti-ref strong, .sub-result strong { color: var(--seal); }
      .traits {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 24px 0 4px;
      }
      .trait {
        padding: 7px 16px;
        border-radius: 999px;
        background: rgba(169, 53, 56, 0.08);
        border: 1px solid rgba(169, 53, 56, 0.16);
        color: var(--rose-d);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
      }
      .score-list {
        margin: 24px auto 0;
        max-width: 560px;
        display: grid;
        gap: 9px;
      }
      .score-row {
        display: grid;
        grid-template-columns: 88px 1fr 36px;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.88rem;
      }
      .bar {
        height: 8px;
        border-radius: 999px;
        background: rgba(169, 53, 56, 0.12);
        overflow: hidden;
      }
      .bar span {
        display: block;
        height: 100%;
        width: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(196,122,122,0.75), var(--seal));
      }
      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        margin-top: 34px;
      }

      .is-hidden { display: none !important; }

      .fade-in { animation: fadeIn 480ms ease both; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .petals span { animation: none; display: none; }
        .fade-in { animation: none; }
      }

      /* ===== 行動裝置字級調校 — 依常見手機螢幕寬度縮放 ===== */
      @media (max-width: 600px) { html { font-size: 93.75%; } }   /* 15px */
      @media (max-width: 430px) { html { font-size: 90.5%; } }    /* ~14.5px，iPhone Pro Max */
      @media (max-width: 393px) { html { font-size: 87.5%; } }    /* 14px，iPhone 12–16 / Pixel */
      @media (max-width: 360px) { html { font-size: 84.4%; } }    /* ~13.5px，常見 Android */
      @media (max-width: 320px) { html { font-size: 81.25%; } }   /* 13px，迷你螢幕 */

      /* 標題在小螢幕另外收斂 */
      @media (max-width: 480px) {
        .intro h1 { font-size: clamp(1.9rem, 8.5vw, 2.5rem); }
        .question { font-size: clamp(1.25rem, 5vw, 1.55rem); }
        .result h2 { font-size: clamp(1.7rem, 7.5vw, 2.35rem); }
        .result .tagline { font-size: clamp(1rem, 4.2vw, 1.2rem); }
        .score-row { grid-template-columns: 76px 1fr 30px; }
      }

      /* ===== 網頁尾部（與首頁 index 相同） ===== */
      .site-footer {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 60px clamp(20px, 5vw, 76px) 40px;
        background: #2b1f1f;
        color: #d8c5c1;
        text-align: center;
      }
      .site-footer .footer-seal { display: grid; place-items: center; }
      .site-footer .footer-icon { width: clamp(84px, 12vw, 112px); height: auto; display: block; }
      .site-footer .footer-tagline {
        margin: 0;
        font-family: "Garamond Premier", "一點明體", serif;
        font-size: 1.15rem;
        letter-spacing: 0.16em;
        color: #ecd9d5;
      }
      .site-footer .footer-copy {
        margin: 0;
        color: #8a7572;
        font-size: 0.84rem;
        letter-spacing: 0.1em;
      }

      /* ===== 頁首橫幅（與 index 一致） ===== */
      .site-header {
        position: fixed;
        inset: 0 0 auto;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 76px;
        padding: 14px clamp(18px, 4vw, 54px);
        background: rgba(251, 245, 239, 0.86);
        border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        transition: background 240ms ease, box-shadow 240ms ease;
      }
      .site-header.is-scrolled {
        background: rgba(251, 245, 239, 0.96);
        box-shadow: 0 1px 20px rgba(81, 54, 50, 0.06);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-family: "Garamond Premier", "一點明體", serif;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-decoration: none;
        color: var(--ink);
      }
      .brand-mark {
        width: 46px;
        height: 46px;
        object-fit: contain;
      }
      .brand-en {
        color: var(--ink-2);
        font-family: "Garamond Premier", "一點明體", serif;
        font-size: 0.86rem;
        letter-spacing: 0.18em;
      }
      .site-nav {
        display: flex;
        align-items: center;
      }
      .nav-home {
        padding: 9px 18px;
        color: #fff;
        background: var(--seal);
        border-radius: 2px;
        font-size: 0.94rem;
        font-weight: 400;
        letter-spacing: 0.08em;
        text-decoration: none;
        transition: background 200ms ease;
      }
      .nav-home:hover { background: var(--rose-d); color: #fff; }

      @media (max-width: 620px) {
        .site-header { min-height: 64px; padding: 10px clamp(14px, 4vw, 24px); }
        .brand { gap: 10px; }
        .brand-mark { width: 40px; height: 40px; font-size: 0.96rem; }
        .brand-en { font-size: 0.74rem; }
      }
    </style>
  </head>
  <body>
    <div class="petals" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <header class="site-header" aria-label="主導覽">
      <a class="brand" href="main_cultivate.html" aria-label="繁花首頁">
        <img class="brand-mark" src="assets/Stamp_Vert.png" alt="繁花 BLOSSOM AGENT" />
        <span class="brand-en">酒店經紀公司</span>
      </a>
      <nav class="site-nav">
        <a href="main_cultivate.html" class="nav-home">← 繁花首頁</a>
      </nav>
    </header>


    <div class="wrap">
      <main class="card">
        <!-- ===== Intro ===== -->
        <section id="intro" class="intro fade-in">
          <div class="intro-art" aria-hidden="true">
            <!-- 牡丹 peony -->
            <svg viewBox="0 0 120 120">
          <g fill="#f0bcc8">
            <ellipse cx="60" cy="24" rx="15" ry="21"/>
            <ellipse cx="60" cy="24" rx="15" ry="21" transform="rotate(45 60 60)"/>

          </g>
          <g fill="#e6a3b6">
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(22.5 60 60)"/>
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(67.5 60 60)"/>
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(112.5 60 60)"/>
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(157.5 60 60)"/>
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(202.5 60 60)"/>
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(247.5 60 60)"/>
            <ellipse cx="60" cy="34" rx="12" ry="16" transform="rotate(292.5 60 60)"/>

          </g>
          <g fill="#d07d92">
            <ellipse cx="60" cy="46" rx="9" ry="12"/>
            <ellipse cx="60" cy="46" rx="9" ry="12" transform="rotate(60 60 60)"/>
            <ellipse cx="60" cy="46" rx="9" ry="12" transform="rotate(120 60 60)"/>

          <circle cx="60" cy="60" r="12" fill="#c4607a"/>

            <circle cx="60" cy="53" r="1.7"/>

          </g>
          <circle cx="60" cy="60" r="4.5" fill="#a84a64"/>
        </svg>
          </div>
          <p class="kicker">FLOWER PERSONALITY</p>
          <h1>妳是哪一種花</h1>
          <p class="lead">
            12 種花，12 種綻放方式。<br />
            回答 12 道情境題，看看妳在關係、魅力、行動與內在世界中，<br />
            最接近哪一種花格。
          </p>
          <p class="note">MBTI 僅作為趣味性的氣質參考，並非正式心理測驗。<br />此測驗無法準確適配妳的 MBTI<br />若想了解可至 MBTI 測驗網測試。</p>
          <button class="btn" type="button" id="start-btn">開始測驗</button>
        </section>

        <!-- ===== Quiz ===== -->
        <section id="quiz" class="is-hidden">
          <div class="progress-head">
            <span id="q-counter">第 1 題 / 共 12 題</span>
            <span id="q-percent">0%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

          <h2 class="question" id="question-text"></h2>
          <div class="options" id="options"></div>

          <div class="quiz-foot">
            <button class="btn ghost" type="button" id="back-btn">← 上一題</button>
            <button class="btn ghost" type="button" id="restart-btn">重新開始</button>
          </div>
        </section>

        <!-- ===== Result ===== -->
        <section id="result" class="result is-hidden">
          <p class="kicker">妳的花格是</p>
          <div class="result-art" id="result-art"></div>
          <p class="tagline" id="result-tagline"></p>
          <p class="desc" id="result-desc"></p>

      let current = 0;
      const answers = new Array(total).fill(null);

      const $ = (id) => document.getElementById(id);
      const introEl = $("intro");
      const quizEl = $("quiz");
      const resultEl = $("result");

      function show(el) {
        [introEl, quizEl, resultEl].forEach((s) => s.classList.add("is-hidden"));
        el.classList.remove("is-hidden");
        el.classList.remove("fade-in");
        void el.offsetWidth; // restart animation
        el.classList.add("fade-in");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function renderQuestion() {
        const item = QUESTIONS[current];
        $("q-counter").textContent = `第 ${current + 1} 題 / 共 ${total} 題`;
        const pct = Math.round((current / total) * 100);
        $("q-percent").textContent = pct + "%";
        $("progress-fill").style.width = pct + "%";
        $("question-text").innerHTML = `${item.q}<span class="question-hint">${item.hint}</span>`;

        const box = $("options");
        box.innerHTML = "";
        const letters = ["A", "B", "C", "D", "E", "F"];
        item.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "option";
          btn.innerHTML = `<span class="dot">${letters[i]}</span><span>${opt.t}</span>`;
          btn.addEventListener("click", () => choose(opt));
          box.appendChild(btn);
        });

        $("back-btn").style.visibility = current === 0 ? "hidden" : "visible";
      }

      function choose(option) {
        answers[current] = option.score;
        if (current < total - 1) {
          current++;
          renderQuestion();
        } else {
          showResult();
        }
      }

      function buildScores() {
        const scores = {};
        FLOWER_ORDER.forEach((k) => (scores[k] = 0));
        answers.forEach((scoreMap) => {
          if (!scoreMap) return;
          Object.entries(scoreMap).forEach(([key, value]) => {
            scores[key] = (scores[key] || 0) + value;
          });
        });
        return scores;
      }

      function sortedFlowers(scores) {
        return FLOWER_ORDER
          .map((key, index) => ({ key, index, score: scores[key] || 0 }))
          .sort((a, b) => b.score - a.score || a.index - b.index);
      }

      function showResult() {
        const scores = buildScores();
        const sorted = sortedFlowers(scores);
        const best = sorted[0];
        const second = sorted[1];
        const f = FLOWERS[best.key];
        const secondFlower = FLOWERS[second.key];
        const maxScore = Math.max(best.score, 1);

        $("result-art").innerHTML = `<img src="assets/flowers/flower-${best.key}.png" alt="${f.name}" />`;
        $("result-tagline").textContent = f.tagline;
        $("result-desc").textContent = f.desc;
        $("result-language").innerHTML = `<strong>花語：</strong>${f.language}`;
        $("result-mbti").innerHTML = `<strong>MBTI 氣質參考：</strong>${f.mbti}`;
        $("result-sub").innerHTML = `<strong>妳的隱性花影：</strong>${secondFlower.name}。這代表妳除了主要花格之外，也帶有「${secondFlower.traits.join("、")}」的一面。`;

        const tEl = $("result-traits");
        tEl.innerHTML = "";
        f.traits.forEach((t) => {
          const span = document.createElement("span");
          span.className = "trait";
          span.textContent = t;
          tEl.appendChild(span);
        });

        const scoreList = $("score-list");
        scoreList.innerHTML = "";
        sorted.slice(0, 5).forEach((row) => {
          const flower = FLOWERS[row.key];
          const el = document.createElement("div");
          el.className = "score-row";
          const width = Math.round((row.score / maxScore) * 100);
          el.innerHTML = `
            <span>${flower.name}</span>
            <div class="bar"><span style="width:${width}%"></span></div>
            <span>${row.score}</span>
          `;
          scoreList.appendChild(el);
        });

        $("progress-fill").style.width = "100%";
        $("q-percent").textContent = "100%";
        show(resultEl);
      }

      function start() {
        current = 0;
        answers.fill(null);
        renderQuestion();
        show(quizEl);
      }

      $("start-btn").addEventListener("click", start);
      $("restart-btn").addEventListener("click", start);
      $("retry-btn").addEventListener("click", () => show(introEl));
      $("back-btn").addEventListener("click", () => {
        if (current > 0) { current--; renderQuestion(); }
      });
    </script>
  </body>
</html>
